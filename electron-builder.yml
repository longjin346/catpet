appId: com.longjin.catpet
productName: CatPet
copyright: Copyright © 2025 Long Jin

directories:
  output: dist
  buildResources: build

# Renderer (dist/) and Electron main (dist-electron/) are bundled.
# ONNX WASM files live in dist/assets/ and are included automatically —
# no native Node modules needed; all AI runs in the renderer via WebAssembly.
files:
  - dist/**/*
  - dist-electron/**/*
  - "!dist/win-unpacked{,/**}"
  - "!**/*.map"

asar: true

win:
  target:
    - target: dir
      arch: [x64]
  icon: build/icon.ico

# README ships next to the exe so users know how to run the portable build
extraFiles:
  - from: README.txt
    to: README.txt
