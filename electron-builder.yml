appId: com.longjin.catpet
productName: CatPet
directories:
  output: dist
  buildResources: build

asar: true
asarUnpack:
  - "native-deps/**"

win:
  target:
    - target: dir
      arch: [x64]
  icon: build/icon.ico

# No NSIS — portable zip only

extraFiles:
  - from: "README.txt"
    to: "."
    filter:
      - "**/*"

extraResources:
  - from: "native-deps/onnxruntime-node"
    to: "native/onnxruntime-node"
    filter: ["**/*.dll", "**/*.node"]
  - from: "native-deps/sharp"
    to: "native/sharp"
    filter: ["**/*.dll", "**/*.node"]
  - from: "native-deps/models"
    to: "native/models"
    filter: ["*.onnx"]
