name: Build Windows Portable

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Package zip
        run: pnpm package:zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CatPet-win-x64
          path: dist/CatPet-*.zip
          retention-days: 90
